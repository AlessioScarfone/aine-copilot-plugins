# mini-sdd configuration file
# Place this file at: {ARTIFACT_MAIN_FOLDER}/mini-sdd.config.yml
#
# MINI-SDD-HOOKS
# -----
# Each step (context, spec, implement) supports optional pre and post hooks.
# A hook is a plain-text instruction that the AI model will follow as an explicit
# step before (pre) or after (post) the skill's main logic.
#
# - pre hooks run before the skill starts its main workflow
# - post hooks run after the skill has completed all its steps
#
# You can define multiple hooks per event — they are executed in order.
# All hooks are optional. Remove or comment out any you don't need.

# EXAMPLE CONFIGURATION
# hooks:
#   context:
#     pre:
#       # Example: remind the model to check for duplicate context files
#       - "Check whether a context.md already exists in a non-standard location and warn the user before proceeding."
#     post:
#       # Example: update the root README with a summary of the context
#       - "After writing context.md, update the project README.md 'Overview' section to match the new product description."

#   spec:
#     pre:
#       # Example: enforce git hygiene before creating a spec
#       - "Before creating the spec, check if there are any uncommitted changes in the working directory and remind the user to commit or stash them."
#     post:
#       # Example: keep a CHANGELOG entry for every new spec
#       - "After writing spec.md and plan.md, append a one-line entry to CHANGELOG.md under '## Unreleased' noting the new spec name and date."

#   implement:
#     pre:
#       # Example: run existing tests before touching code
#       - "Before starting implementation, remind the user to run the existing test suite and confirm it is green."
#     post:
#       # Example: enforce linting and tests after every implementation
#       - "After all tasks are complete, remind the user to run 'npm run lint && npm test' (or the equivalent for this project's stack) and fix any failures before closing the spec."
